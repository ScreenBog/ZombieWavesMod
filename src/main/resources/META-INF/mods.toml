modLoader="javafml"
loaderVersion="[47,)"
license="MIT"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}

Features:
- Automatic zombie waves every 10 minutes (configurable)
- Scaling difficulty per wave
- Coin rewards for kills and wave clear bonus
- /coins and /shop commands
- Per-player multiplayer progress
- Optional mod integration hooks
'''

[[dependencies.${mod_id}]]
modId="forge"
mandatory=true
versionRange="[47,)"
ordering="NONE"
side="BOTH"

[[dependencies.${mod_id}]]
modId="minecraft"
mandatory=true
versionRange="[1.20.1,1.21)"
ordering="NONE"
side="BOTH"